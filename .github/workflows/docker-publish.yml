name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allow manual trigger

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up QEMU for multi-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # Set up Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Login to GitHub Container Registry
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Get the latest CLIProxyAPI version tag via GitHub CLI to avoid rate limits
      - name: Get latest CLIProxyAPI version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(gh release view --repo router-for-me/CLIProxyAPI --json tagName --jq .tagName 2>/dev/null | tr -d '\r' | tr -d '\n' | xargs)
          if [ -z "$VERSION" ]; then
            echo "gh CLI failed, trying curl api with token..."
            VERSION=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest | jq -r .tag_name 2>/dev/null | tr -d '\r' | tr -d '\n' | xargs)
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "curl with token failed, trying curl api without token..."
            VERSION=$(curl -s https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest | jq -r .tag_name 2>/dev/null | tr -d '\r' | tr -d '\n' | xargs)
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Error: Failed to retrieve version tag from GitHub"
            exit 1
          fi
          CLEAN_VERSION=$(echo "$VERSION" | sed 's/^v//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "clean_version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION (clean: $CLEAN_VERSION)"

          # Create target directories
          mkdir -p bin/amd64 bin/arm64

          # Download and extract linux_amd64 binary
          echo "Downloading amd64 release..."
          curl -L -o cliproxy_amd64.tar.gz "https://github.com/router-for-me/CLIProxyAPI/releases/download/${VERSION}/CLIProxyAPI_${CLEAN_VERSION}_linux_amd64.tar.gz"
          mkdir -p tmp_amd64
          tar -xzf cliproxy_amd64.tar.gz -C tmp_amd64
          BINARY_PATH_AMD64=$(find tmp_amd64 -name "cli-proxy-api" -type f | head -n 1)
          if [ -z "$BINARY_PATH_AMD64" ]; then echo "AMD64 binary not found after extraction"; exit 1; fi
          mv "$BINARY_PATH_AMD64" bin/amd64/cli-proxy-api
          chmod +x bin/amd64/cli-proxy-api
          rm -rf tmp_amd64 cliproxy_amd64.tar.gz

          # Download and extract linux_arm64 binary
          echo "Downloading arm64 release..."
          curl -L -o cliproxy_arm64.tar.gz "https://github.com/router-for-me/CLIProxyAPI/releases/download/${VERSION}/CLIProxyAPI_${CLEAN_VERSION}_linux_arm64.tar.gz"
          mkdir -p tmp_arm64
          tar -xzf cliproxy_arm64.tar.gz -C tmp_arm64
          BINARY_PATH_ARM64=$(find tmp_arm64 -name "cli-proxy-api" -type f | head -n 1)
          if [ -z "$BINARY_PATH_ARM64" ]; then echo "ARM64 binary not found after extraction"; exit 1; fi
          mv "$BINARY_PATH_ARM64" bin/arm64/cli-proxy-api
          chmod +x bin/arm64/cli-proxy-api
          rm -rf tmp_arm64 cliproxy_arm64.tar.gz

          echo "Binaries prepared successfully."

      # Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.get-version.outputs.version }},enable=${{ steps.get-version.outputs.version != '' }}
            type=raw,value=${{ steps.get-version.outputs.clean_version }},enable=${{ steps.get-version.outputs.clean_version != '' }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long

      # Build and push Docker image with Buildx (don't push on PR)
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.get-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
